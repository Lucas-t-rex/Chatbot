# fly.toml app configuration file generated for chatbot-python-lucas on 2026-01-06T20:15:57-03:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'chatbot-python-lucas'
primary_region = 'gru'

[build]

[env]
  PYTHONUNBUFFERED = '1'

[processes]
  app = 'gunicorn --bind 0.0.0.0:8000 --workers 1 --timeout 120 main:app'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '30s'
    method = 'get'
    path = '/'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
